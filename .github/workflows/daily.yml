name: Daily news clipping

on:
  schedule:
    # 매일 오전 7시(KST) 근처 = 전날 22:07 UTC (지시서 11번).
    # 정각(0분)은 GitHub Actions 스케줄이 전 세계에서 가장 몰리는 시간대라 지연·드롭 위험이 높음(공식 문서에 명시).
    # 2026-07-08 정각(22:00 UTC) 스케줄이 실제로 드롭되어 07분으로 조정함.
    - cron: "7 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline (collect, summarize, email)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          CURRENTS_API_KEY: ${{ secrets.CURRENTS_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -m engine.pipeline

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/*.json
          git diff --staged --quiet || git commit -m "chore: 뉴스클리핑 데이터 갱신 ($(date -u +%Y-%m-%d))"
          git push
