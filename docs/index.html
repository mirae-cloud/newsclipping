<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>뉴스클리핑</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.css" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <div class="header-top-row">
      <h1 class="site-title">뉴스클리핑</h1>
      <div class="header-date" id="header-date"></div>
    </div>
    <nav class="tabs" id="tabs">
      <button class="tab-btn active" data-tab="economy">경제</button>
      <button class="tab-btn" data-tab="industry">산업군</button>
      <button class="tab-btn" data-tab="business">Business</button>
      <button class="tab-btn" data-tab="saved">저장됨</button>
    </nav>
  </div>
</header>

<main>
  <section id="view-economy" class="view active"></section>
  <section id="view-industry" class="view"></section>
  <section id="view-business" class="view"></section>
  <section id="view-saved" class="view"></section>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="js/app.js"></script>
</body>
</html>
